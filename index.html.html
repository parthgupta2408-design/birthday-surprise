<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎂</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    .container {
        text-align: center;
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    button {
        padding: 12px 25px;
        border: none;
        border-radius: 20px;
        font-size: 18px;
        cursor: pointer;
        margin: 10px;
    }

    .yes {
        background: #ff4081;
        color: white;
    }

    .no {
        background: lightgray;
        position: absolute;
    }

    @keyframes fadeIn {
        from { opacity:0; transform:translateY(20px); }
        to { opacity:1; transform:translateY(0); }
    }

    @keyframes fall {
        0% { transform: translateY(-10vh) rotate(0deg); opacity:1; }
        100% { transform: translateY(110vh) rotate(360deg); opacity:0; }
    }

    @keyframes floatUp {
        0% { transform: translateY(0); opacity:1; }
        100% { transform: translateY(-100vh); opacity:0; }
    }
</style>
</head>

<body>

<div class="container">
    <h1>Happiest bday Don aur 😝😋✌️ 🎂</h1>
    <p>Ready for a surprise? 👀</p>

    <button class="yes" onclick="showSurprise()">Yes 🎉</button>
</div>

<button class="no" id="noBtn">No 😏</button>

<script>
const noBtn = document.getElementById("noBtn");

function moveButton() {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

document.addEventListener("mousemove", (e) => {
    const rect = noBtn.getBoundingClientRect();
    const distance = Math.hypot(e.clientX - rect.x, e.clientY - rect.y);

    if (distance < 120) {
        moveButton();
    }
});

noBtn.addEventListener("mouseover", moveButton);

function createConfetti() {
    for (let i = 0; i < 60; i++) {
        const confetti = document.createElement("div");
        confetti.style.position = "absolute";
        confetti.style.width = "8px";
        confetti.style.height = "8px";
        confetti.style.background = `hsl(${Math.random()*360},100%,50%)`;
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.top = "-10px";
        confetti.style.animation = `fall ${2 + Math.random()*3}s linear infinite`;
        document.body.appendChild(confetti);
    }
}

function createHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.style.position = "absolute";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.bottom = "0";
        heart.style.fontSize = (20 + Math.random()*20) + "px";
        heart.style.animation = `floatUp ${3 + Math.random()*2}s linear`;
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }, 300);
}

function showSurprise() {
    document.body.innerHTML = `
        <div style="position:relative; width:100vw; height:100vh; overflow:hidden;">

            <img src="don.jpeg" 
                 style="position:absolute; width:100%; height:100%; object-fit:cover;">

            <div style="position:absolute; width:100%; height:100%; background:rgba(0,0,0,0.4);"></div>

            <div style="
                position:relative;
                z-index:2;
                display:flex;
                flex-direction:column;
                justify-content:center;
                align-items:center;
                height:100%;
                color:white;
                text-align:center;
                animation: fadeIn 1s ease;
            ">
                <h1 style="font-size:50px;">🎉 SURPRISE 🎉</h1>
                <p style="font-size:24px;">
                    Happiest Birthday Don 😝😋✌️<br>
                    You’re amazing 💖
                </p>
            </div>

        </div>
    `;

    createConfetti();
    createHearts();
}

moveButton();
</script>

</body>
</html>
